<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte — Le Vieux-Lyon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0810;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
}
.card {
  width: 300px;
  height: 460px;
  border-radius: 16px;
  border: 1.5px solid rgba(201,145,58,0.6);
  box-shadow:
    0 0 0 1px rgba(201,145,58,0.1),
    0 40px 100px rgba(0,0,0,0.95),
    0 0 60px rgba(201,145,58,0.05);
  background: #0e0c18;
  position: relative;
  overflow: hidden;
}
.card-inner-border {
  position: absolute;
  inset: 5px;
  border-radius: 12px;
  border: 1px solid rgba(201,145,58,0.1);
  pointer-events: none;
  z-index: 10;
}
.card-img {
  width: 100%;
  height: 66%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.card-fade {
  position: absolute;
  top: 36%;
  left: 0; right: 0;
  height: 140px;
  background: linear-gradient(to bottom, transparent, #0e0c18);
  pointer-events: none;
  z-index: 2;
}
.card-badge-type {
  position: absolute;
  top: 12px; left: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase;
  color: #c9913a;
  background: rgba(10,8,16,0.85);
  border: 1px solid rgba(201,145,58,0.45);
  padding: 4px 10px;
  border-radius: 10px;
  z-index: 5;
}
.card-badge-rarity {
  position: absolute;
  top: 12px; right: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase;
  color: #c8a8f0;
  background: rgba(107,79,160,0.2);
  border: 1px solid rgba(107,79,160,0.5);
  padding: 4px 10px;
  border-radius: 10px;
  z-index: 5;
}
.card-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px 18px 16px;
  z-index: 3;
}
.card-fragment {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(201,145,58,0.4);
  margin-bottom: 5px;
  display: block;
}
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 300;
  color: #f0ece2;
  line-height: 1;
  margin-bottom: 3px;
}
.card-name em {
  font-style: italic;
  color: #c9913a;
}
.card-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; font-style: italic;
  color: rgba(201,145,58,0.65);
  margin-bottom: 8px;
  display: block;
}
.card-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,145,58,0.4), transparent);
  margin-bottom: 8px;
}
.card-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-style: italic;
  color: rgba(240,236,226,0.55);
  line-height: 1.6;
  margin-bottom: 10px;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-powder { display: flex; align-items: center; gap: 6px; }
.card-powder-bar {
  width: 56px; height: 3px;
  background: rgba(201,145,58,0.12);
  border-radius: 2px; overflow: hidden;
}
.card-powder-fill {
  width: 28%; height: 100%;
  background: linear-gradient(90deg, #c9913a, #e8c06a);
  border-radius: 2px;
}
.card-powder-label {
  font-family: 'DM Mono', monospace;
  font-size: 7.5px; letter-spacing: 1px;
  color: rgba(201,145,58,0.38);
  text-transform: uppercase;
}
.card-id {
  font-family: 'DM Mono', monospace;
  font-size: 7.5px; letter-spacing: 1px;
  color: rgba(201,145,58,0.22);
}
</style>
</head>
<body>
<div class="card">
  <div class="card-inner-border"></div>
  <img class="card-img" src="https://explorestudio.github.io/expLore-project/vieux-lyon.png" alt="Le Vieux-Lyon"/>
  <div class="card-fade"></div>
  <span class="card-badge-type">Lieu</span>
  <span class="card-badge-rarity">Rare</span>
  <div class="card-body">
    <span class="card-fragment">Fragment · III</span>
    <div class="card-name">Le Vieux-<em>Lyon</em></div>
    <span class="card-subtitle">Les traboules de l'oubli</span>
    <div class="card-divider"></div>
    <p class="card-quote">"Ces pierres se souviennent de tout.<br>C'est pour ça qu'on veut les faire taire."</p>
    <div class="card-footer">
      <div class="card-powder">
        <div class="card-powder-bar"><div class="card-powder-fill"></div></div>
        <span class="card-powder-label">Poudre I / III</span>
      </div>
      <span class="card-id">EXP-LYO-0003</span>
    </div>
  </div>
</div>
</body>
</html>
